<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#231f1a" />
<meta name="description" content="Wildlands: Safari Saga - a creature-collecting RPG featuring real animals across eight biomes." />
<title>Wildlands: Safari Saga</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #231f1a;
    color: #f2e8d5;
    font-family: 'Courier New', ui-monospace, monospace;
    overscroll-behavior: none;
  }
  * { -webkit-tap-highlight-color: transparent; }
  button {
    touch-action: none;
    -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }
  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 10px;
    text-align: center;
    padding: 20px;
  }
  #loading h1 { color: #e8c547; letter-spacing: 3px; margin: 0; font-size: 30px; }
  #loading p { color: #8a7f68; font-size: 12px; margin: 0; }
</style>
</head>
<body>
<div id="root">
  <div id="loading">
    <h1>WILDLANDS</h1>
    <p id="status">Waking the savanna...</p>
  </div>
</div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script>
/* The game source is split across several .jsx parts purely for ease of
   editing and committing. They are concatenated in order, transpiled in the
   browser, and run as one program - identical to a single source file. */
var GAME_PARTS = [
  "game.part1.jsx",
  "game.part2.jsx",
  "game.part3.jsx",
  "game.part3b.jsx", "game.part6.jsx", "game.part7.jsx", "game.part8.jsx", "game.part9.jsx", "game.part10.jsx", "game.part11.jsx", "game.part12.jsx", "game.part13.jsx", "game.part14.jsx", "game.part15.jsx", "game.part16.jsx", "game.part17.jsx", "game.part18.jsx", "game.part19.jsx", "game.part20.jsx", "game.part21.jsx", "game.part22.jsx", "game.part23.jsx", "game.part24.jsx", "game.part25.jsx", "game.part26.jsx", "game.part27.jsx", "game.part28.jsx", "game.part29.jsx", "game.part30.jsx", "game.part31.jsx", "game.part32.jsx", "game.part33.jsx", "game.part34.jsx", "game.part35.jsx", "game.part36.jsx", "game.part37.jsx", "game.part38.jsx", "game.part39.jsx", "game.part40.jsx", "game.part41.jsx", "game.part42.jsx", "game.part43.jsx", "game.part4.jsx",
  "game.part5.jsx"
];

(function () {
  var statusEl = document.getElementById("status");
  function fail(msg, err) {
    if (statusEl) statusEl.textContent = msg;
    if (err) console.error(err);
  }
  if (typeof React === "undefined" || typeof ReactDOM === "undefined" || typeof Babel === "undefined") {
    fail("Could not reach the CDN. Check your connection and reload.");
    return;
  }
  var texts = new Array(GAME_PARTS.length);
  var done = 0;
  var failed = false;

  // Report the first failure and then stop touching the status line. The old
  // loader let a later successful fetch overwrite the error message, so a file
  // that failed showed up as the counter simply stopping - which says nothing
  // about what went wrong.
  function hardFail(msg, err) {
    if (failed) return;
    failed = true;
    if (statusEl) statusEl.textContent = msg;
    if (err) console.error(err);
  }

  // One flaky fetch used to end the load permanently. On a phone that is a
  // normal thing to happen - a dropped packet, a switch between wifi and data,
  // a CDN edge still catching up with a fresh deploy. Each part now gets three
  // attempts with a short backoff before it is treated as fatal.
  function grab(name, attempt) {
    return fetch(name, { cache: "no-cache" }).then(function (r) {
      if (!r.ok) throw new Error(name + " -> HTTP " + r.status);
      return r.text();
    }).catch(function (e) {
      if (attempt >= 3) throw e;
      if (statusEl && !failed) statusEl.textContent = "Retrying " + name + "...";
      return new Promise(function (res) { setTimeout(res, 400 * attempt); })
        .then(function () { return grab(name, attempt + 1); });
    });
  }

  GAME_PARTS.forEach(function (name, i) {
    grab(name, 1)
      .then(function (t) {
        if (failed) return;
        texts[i] = t;
        done++;
        if (statusEl) statusEl.textContent = "Loading... " + done + "/" + GAME_PARTS.length;
        if (done === GAME_PARTS.length) {
          try {
            var code = texts.join("\n");
            var out = Babel.transform(code, { presets: [["react", { runtime: "classic" }]] }).code;
            (0, eval)(out);
          } catch (e) {
            hardFail("The game failed to start: " + e.message, e);
          }
        }
      })
      .catch(function (e) {
        hardFail("Could not load " + name + " after 3 tries. Check your connection and reload.", e);
      });
  });
})();
</script>
</body>
</html>
